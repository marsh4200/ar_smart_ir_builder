learn_and_capture:
  name: Learn and capture code
  description: Start Broadlink learn mode and capture the learned code into AR Smart IR Builder storage.
  fields:
    entry_id:
      required: true
      selector:
        text:
    device_key:
      required: true
      selector:
        text:
    command_name:
      required: true
      selector:
        text:
    broadlink_device:
      required: false
      selector:
        text:
    command_type:
      required: false
      selector:
        select:
          options:
            - ir
            - rf
    alternative:
      required: false
      selector:
        boolean: {}

save_device:
  name: Save device
  description: Save or update a learned Broadlink profile before creating or refreshing entities.
  fields:
    device_key:
      required: true
      selector:
        text:
    entry_id:
      required: false
      selector:
        text:
    name:
      required: false
      selector:
        text:
    manufacturer:
      required: false
      selector:
        text:
    model:
      required: false
      selector:
        text:
    device_type:
      required: false
      selector:
        select:
          options:
            - climate
            - fan
            - media_player
            - tv
    supported_models:
      required: false
      selector:
        text:
    commands_encoding:
      required: false
      selector:
        text:
    commands:
      required: false
      selector:
        object:

export_device:
  name: Export device
  description: Export a saved device profile as a SmartIR-style JSON file into /config/www/ar_smart_ir_exports.
  fields:
    device_key:
      required: true
      selector:
        text:
