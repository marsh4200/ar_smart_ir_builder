learn_and_capture:
  name: Learn and capture code
  description: >
    Start learn mode and capture the learned code into AR Smart IR Builder storage.
    For Broadlink entries this triggers the remote's learn mode; for Tasmota (MQTT)
    entries it waits for the device's next IR receive event instead.
  fields:
    entry_id:
      required: true
      selector:
        text:
    device_key:
      required: true
      selector:
        text:
    command_name:
      required: true
      selector:
        text:
    broadlink_device:
      required: false
      selector:
        text:
    command_type:
      required: false
      description: Broadlink only — ignored for Tasmota (MQTT) entries, which are IR-only.
      selector:
        select:
          options:
            - ir
            - rf
    alternative:
      required: false
      selector:
        boolean: {}
    learn_timeout:
      required: false
      description: Tasmota (MQTT) only — seconds to wait for an IR receive event before giving up. Default 25.
      selector:
        number:
          min: 5
          max: 60
          step: 1

save_device:
  name: Save device
  description: Save or update a learned Broadlink profile before creating or refreshing entities.
  fields:
    device_key:
      required: true
      selector:
        text:
    entry_id:
      required: false
      selector:
        text:
    name:
      required: false
      selector:
        text:
    manufacturer:
      required: false
      selector:
        text:
    model:
      required: false
      selector:
        text:
    device_type:
      required: false
      selector:
        select:
          options:
            - climate
            - fan
            - media_player
            - tv
    supported_models:
      required: false
      selector:
        text:
    commands_encoding:
      required: false
      selector:
        text:
    commands:
      required: false
      selector:
        object:
    command_options:
      required: false
      description: >
        Optional per-command repeat policy. Map of command_name → { repeat: int (1-20),
        delay: number, delay_unit: "ms" or "s" }. Commands omitted from this dict
        send once. Sending an empty dict clears all repeat policies for this device.
      selector:
        object:

export_device:
  name: Export SmartIR JSON
  description: Export a saved device profile as a SmartIR-style JSON file into /config/www/ar_smart_ir_exports.
  fields:
    device_key:
      required: true
      selector:
        text:

export_ha_scripts:
  name: Export HA scripts
  description: Export a saved device profile as Home Assistant script YAML into /config/www/ar_smart_ir_exports.
  fields:
    device_key:
      required: true
      selector:
        text:

test_command:
  name: Test command
  description: Fire a single learned command from a saved profile immediately via the entry's IR controller (Broadlink remote or Tasmota MQTT).
  fields:
    entry_id:
      required: true
      selector:
        text:
    device_key:
      required: true
      selector:
        text:
    command_name:
      required: true
      selector:
        text:

delete_device:
  name: Delete device
  description: Permanently delete a saved device profile and all its learned commands.
  fields:
    device_key:
      required: true
      selector:
        text:
    entry_id:
      required: false
      selector:
        text:
